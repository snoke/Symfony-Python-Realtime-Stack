snoke_ws:
  transport:
    type: '%env(default:redis_stream:WS_TRANSPORT_TYPE)%'
    redis_stream:
      dsn: '%env(WS_REDIS_DSN)%'
      stream: '%env(WS_REDIS_STREAM)%'
    rabbitmq:
      dsn: '%env(WS_RABBITMQ_DSN)%'
      exchange: '%env(WS_RABBITMQ_EXCHANGE)%'
      queue: '%env(WS_RABBITMQ_QUEUE)%'
      routing_key: '%env(WS_RABBITMQ_ROUTING_KEY)%'
  presence:
    type: '%env(default:redis:WS_PRESENCE_TYPE)%'
    redis:
      dsn: '%env(WS_REDIS_DSN)%'
      prefix: '%env(WS_REDIS_PREFIX)%'
  events:
    type: '%env(default:redis_stream:WS_EVENTS_TYPE)%'
    redis_stream:
      dsn: '%env(WS_REDIS_DSN)%'
      stream: '%env(default:ws.events:WS_REDIS_EVENTS_STREAM)%'
    rabbitmq:
      dsn: '%env(WS_RABBITMQ_DSN)%'
      exchange: '%env(default:ws.events:WS_RABBITMQ_EVENTS_EXCHANGE)%'
      queue: '%env(default:ws.events:WS_RABBITMQ_EVENTS_QUEUE)%'
      routing_key: '%env(default:ws.events:WS_RABBITMQ_EVENTS_ROUTING_KEY)%'
  subjects:
    user_prefix: 'user:'
